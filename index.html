<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SNIPER TERMINAL</title>

<style>

body{
background:#000;
color:#00ff9d;
font-family:monospace;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

button{
background:#00ff9d;
color:#000;
border:none;
padding:15px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

#status{
margin-top:10px;
color:#00b8ff;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #00ff9d;
padding:8px;
text-align:center;
}

.strategy{
background:#111;
padding:20px;
margin-top:25px;
border:1px solid #00ff9d;
}

</style>

</head>

<body>

<div class="container">

<h1>SNIPER TERMINAL</h1>

<p>Options Chain Analyzer</p>

<input type="file" id="imageInput" accept="image/*">

<button id="analyzeBtn">
ANALISAR PRINT
</button>

<div id="status"></div>

<div id="chainTable"></div>

<div id="strategyBox"></div>

</div>

<script>

const btn = document.getElementById("analyzeBtn")

btn.onclick = async ()=>{

const input = document.getElementById("imageInput")

if(!input.files.length){

alert("Envie a print da option chain")

return

}

document.getElementById("status").innerText="Processando imagem..."

const file = input.files[0]

const base64 = await fileToBase64(file)

document.getElementById("status").innerText="Lendo dados da imagem..."

const chain = await extractChain(base64)

renderChain(chain)

const strat = findBestSpread(chain)

renderStrategy(strat)

}

function fileToBase64(file){

return new Promise((resolve)=>{

const reader = new FileReader()

reader.onload = ()=>resolve(reader.result)

reader.readAsDataURL(file)

})

}

async function extractChain(image){

const base64 = image.split(",")[1]

const response = await fetch("https://api.anthropic.com/v1/messages",{

method:"POST",

headers:{
"Content-Type":"application/json",
"x-api-key":"SUA_API_KEY",
"anthropic-version":"2023-06-01"
},

body:JSON.stringify({

model:"claude-sonnet-4-20250514",

max_tokens:1200,

messages:[{

role:"user",

content:[

{
type:"image",
source:{
type:"base64",
media_type:"image/jpeg",
data:base64
}
},

{
type:"text",
text:`
Leia a tabela de opções da imagem.

Extraia:

strike
bid
ask
delta
gamma
volume

retorne JSON:

{
spot:number,
options:[
{
strike:number,
bid:number,
ask:number,
delta:number,
gamma:number,
volume:number
}
]
}
`
}

]

}]

})

})

const data = await response.json()

const text = data.content[0].text

return JSON.parse(text)

}

function renderChain(data){

let html="<table>"

html+="<tr><th>Strike</th><th>Bid</th><th>Ask</th></tr>"

data.options.forEach(o=>{

html+=`

<tr>
<td>${o.strike}</td>
<td>${o.bid}</td>
<td>${o.ask}</td>
</tr>

`

})

html+="</table>"

document.getElementById("chainTable").innerHTML=html

}

function findBestSpread(data){

let best=null

data.options.forEach(buy=>{

data.options.forEach(sell=>{

if(sell.strike>buy.strike){

const cost=buy.ask-sell.bid

if(cost<=0) return

const profit=(sell.strike-buy.strike)-cost

const rr=profit/cost

if(rr>2){

best={
buy:buy.strike,
sell:sell.strike,
cost,
profit,
rr
}

}

}

})

})

return best

}

function renderStrategy(s){

if(!s){

document.getElementById("strategyBox").innerHTML="Nenhuma trava encontrada"

return

}

document.getElementById("strategyBox").innerHTML=`

<div class="strategy">

<h3>Melhor Estrutura</h3>

Comprar CALL ${s.buy}

<br>

Vender CALL ${s.sell}

<br><br>

Custo: ${s.cost}

<br>

Lucro máximo: ${s.profit}

<br>

Risk Reward: ${s.rr.toFixed(2)}

</div>

`

}

</script>

</body>

</html>
